<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jax ✌️🐰</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}
.container {
  position: relative;
  width: 100vw; height: 100vh;
  display: flex; justify-content: center; align-items: center;
}
.stars { position: fixed; top:0;left:0;width:100%;height:100%;pointer-events:none; }
.star {
  position: absolute; width:3px;height:3px; background:#c77dff;
  border-radius:50%; animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle { 0%,100%{opacity:0.3} 50%{opacity:1} }

.title {
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  color:#c77dff;font-size:2em;
  text-shadow:0 0 20px #9d4edd,0 0 40px #7b2cbf;
  z-index:10;pointer-events:none;
  animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow { from{text-shadow:0 0 10px #9d4edd} to{text-shadow:0 0 30px #c77dff,0 0 60px #7b2cbf} }

.jax-wrapper {
  animation: float 3s ease-in-out infinite;
  transform: rotate(20deg);
}
@keyframes float {
  0%,100% { transform: rotate(20deg) translateY(0); }
  50% { transform: rotate(20deg) translateY(-15px); }
}

svg.jax {
  width: min(85vw, 380px);
  height: auto;
  filter: drop-shadow(0 0 25px rgba(157,78,221,0.4));
}

.v-hand { transform-origin: 240px 160px; animation: wave 0.8s ease-in-out infinite; }
@keyframes wave { 0%,100%{transform:rotate(0)} 50%{transform:rotate(8deg)} }

.left-arm-g { transform-origin: 100px 200px; animation: arm-swing 2s ease-in-out infinite; }
@keyframes arm-swing { 0%,100%{transform:rotate(0)} 50%{transform:rotate(5deg)} }

.ear-left { transform-origin: 115px 70px; animation: efl 2s ease-in-out infinite; }
.ear-right { transform-origin: 205px 70px; animation: efr 2s ease-in-out infinite; }
@keyframes efl { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-4deg)} }
@keyframes efr { 0%,100%{transform:rotate(0)} 50%{transform:rotate(4deg)} }

.left-leg-g { transform-origin: 135px 310px; animation: lkl 1.5s ease-in-out infinite; }
.right-leg-g { transform-origin: 175px 310px; animation: lkr 1.5s ease-in-out infinite; }
@keyframes lkl { 0%,100%{transform:rotate(8deg)} 50%{transform:rotate(-3deg)} }
@keyframes lkr { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
</style>
</head>
<body>
<div class="container">
  <div class="stars" id="stars"></div>
  <div class="title">🐰 Jax ✌️</div>
  
  <div class="jax-wrapper">
    <svg class="jax" viewBox="60 0 210 420" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#9d4edd"/>
          <stop offset="100%" stop-color="#7b2cbf"/>
        </linearGradient>
        <linearGradient id="ei" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#e8b4f8"/>
          <stop offset="100%" stop-color="#d4a0e8"/>
        </linearGradient>
        <linearGradient id="og" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#d4465a"/>
          <stop offset="100%" stop-color="#b83a4c"/>
        </linearGradient>
        <linearGradient id="yg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f5d442"/>
          <stop offset="100%" stop-color="#e6b817"/>
        </linearGradient>
        <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#9d4edd"/>
          <stop offset="100%" stop-color="#6a2fa0"/>
        </linearGradient>
      </defs>

      <!-- LEFT EAR -->
      <g class="ear-left">
        <ellipse cx="115" cy="38" rx="18" ry="52" fill="url(#pg)" transform="rotate(-12,115,70)"/>
        <ellipse cx="115" cy="38" rx="9" ry="35" fill="url(#ei)" transform="rotate(-12,115,70)"/>
      </g>

      <!-- RIGHT EAR -->
      <g class="ear-right">
        <ellipse cx="205" cy="35" rx="18" ry="52" fill="url(#pg)" transform="rotate(15,205,70)"/>
        <ellipse cx="205" cy="35" rx="9" ry="35" fill="url(#ei)" transform="rotate(15,205,70)"/>
      </g>

      <!-- HEAD -->
      <ellipse cx="160" cy="128" rx="52" ry="48" fill="url(#pg)"/>

      <!-- LEFT EYE - winking -->
      <line x1="128" y1="120" x2="152" y2="118" stroke="#1a1a2e" stroke-width="4" stroke-linecap="round"/>
      
      <!-- RIGHT EYE - open -->
      <ellipse cx="180" cy="116" rx="14" ry="12" fill="#f5d442"/>
      <circle cx="182" cy="116" r="7" fill="#1a1a2e"/>
      <circle cx="179" cy="113" r="2.5" fill="white" opacity="0.8"/>

      <!-- MOUTH - big grin -->
      <path d="M135 148 Q160 172 185 148" fill="#2a1040"/>
      <rect x="152" y="148" width="6" height="9" rx="1" fill="white"/>
      <rect x="160" y="148" width="6" height="9" rx="1" fill="white"/>
      <!-- Smirk -->
      <path d="M185 148 Q192 143 195 137" fill="none" stroke="#5a1d99" stroke-width="2.5" stroke-linecap="round"/>

      <!-- NECK area -->
      <rect x="148" y="170" width="24" height="12" rx="6" fill="url(#pg)"/>

      <!-- BODY -->
      <ellipse cx="160" cy="220" rx="40" ry="52" fill="url(#pg)"/>

      <!-- OVERALLS -->
      <path d="M125 230 Q125 278 160 278 Q195 278 195 230 Q195 260 160 265 Q125 260 125 230Z" fill="url(#og)"/>
      <!-- Straps connected to body -->
      <path d="M140 198 L135 230" stroke="url(#og)" stroke-width="9" stroke-linecap="round"/>
      <path d="M180 198 L185 230" stroke="url(#og)" stroke-width="9" stroke-linecap="round"/>
      <!-- Buttons -->
      <circle cx="137" cy="232" r="4" fill="url(#yg)"/>
      <circle cx="183" cy="232" r="4" fill="url(#yg)"/>
      <!-- Pocket -->
      <rect x="148" y="250" width="24" height="14" rx="3" fill="none" stroke="#a03050" stroke-width="1.5"/>

      <!-- LEFT ARM (down, relaxed) -->
      <g class="left-arm-g">
        <!-- Upper arm connected to body -->
        <path d="M122 200 Q105 220 95 245" stroke="url(#pg)" stroke-width="18" stroke-linecap="round" fill="none"/>
        <!-- Forearm -->
        <path d="M95 245 Q88 260 82 275" stroke="url(#pg)" stroke-width="15" stroke-linecap="round" fill="none"/>
        <!-- Hand -->
        <circle cx="80" cy="280" r="12" fill="url(#yg)"/>
      </g>

      <!-- RIGHT ARM (up, V sign!) -->
      <g class="v-hand">
        <!-- Upper arm connected to body -->
        <path d="M198 200 Q215 185 225 165" stroke="url(#pg)" stroke-width="18" stroke-linecap="round" fill="none"/>
        <!-- Forearm -->
        <path d="M225 165 Q232 148 238 132" stroke="url(#pg)" stroke-width="15" stroke-linecap="round" fill="none"/>
        <!-- Hand -->
        <circle cx="240" cy="125" r="13" fill="url(#yg)"/>
        
        <!-- V SIGN ✌️ -->
        <rect x="230" y="88" width="7" height="32" rx="3.5" fill="url(#yg)" transform="rotate(-10,233,104)"/>
        <rect x="244" y="86" width="7" height="32" rx="3.5" fill="url(#yg)" transform="rotate(10,247,102)"/>
        <!-- Folded fingers -->
        <circle cx="254" cy="128" r="5" fill="#e6b817"/>
        <circle cx="228" cy="130" r="5" fill="#e6b817"/>
      </g>

      <!-- LEFT LEG (kicked out left) -->
      <g class="left-leg-g">
        <!-- Upper leg -->
        <path d="M140 272 Q125 295 112 315" stroke="url(#og)" stroke-width="20" stroke-linecap="round" fill="none"/>
        <!-- Lower leg -->
        <path d="M112 315 Q105 335 98 350" stroke="url(#og)" stroke-width="17" stroke-linecap="round" fill="none"/>
        <!-- Shoe -->
        <ellipse cx="90" cy="358" rx="20" ry="10" fill="url(#sg)" transform="rotate(20,90,358)"/>
      </g>

      <!-- RIGHT LEG (kicked out right) -->
      <g class="right-leg-g">
        <!-- Upper leg -->
        <path d="M180 272 Q192 295 200 315" stroke="url(#og)" stroke-width="20" stroke-linecap="round" fill="none"/>
        <!-- Lower leg -->
        <path d="M200 315 Q208 335 215 350" stroke="url(#og)" stroke-width="17" stroke-linecap="round" fill="none"/>
        <!-- Shoe -->
        <ellipse cx="222" cy="358" rx="20" ry="10" fill="url(#sg)" transform="rotate(-15,222,358)"/>
      </g>
    </svg>
  </div>
</div>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random()*100+'%';
  s.style.top = Math.random()*100+'%';
  const sz = (Math.random()*3+1)+'px';
  s.style.width = sz; s.style.height = sz;
  s.style.animationDelay = Math.random()*3+'s';
  s.style.animationDuration = (Math.random()*2+2)+'s';
  starsEl.appendChild(s);
}
</script>
</body>
</html>
