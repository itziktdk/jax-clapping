<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jax ✌️🐰</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
}
.container {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Stars background */
.stars {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.star {
  position: absolute;
  width: 3px; height: 3px;
  background: #c77dff;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

.title {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #c77dff;
  font-size: 2em;
  text-shadow: 0 0 20px #9d4edd, 0 0 40px #7b2cbf;
  z-index: 10;
  animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 10px #9d4edd; }
  to { text-shadow: 0 0 30px #c77dff, 0 0 60px #7b2cbf; }
}

/* JAX SVG CHARACTER */
.jax-wrapper {
  position: relative;
  animation: float 3s ease-in-out infinite;
  transform: rotate(15deg);
}
@keyframes float {
  0%, 100% { transform: rotate(15deg) translateY(0); }
  50% { transform: rotate(15deg) translateY(-15px); }
}

svg.jax {
  width: 320px;
  height: 450px;
  filter: drop-shadow(0 0 30px rgba(157, 78, 221, 0.5));
}

/* Ear animation */
.ear-left {
  transform-origin: 130px 80px;
  animation: ear-flop-l 2s ease-in-out infinite;
}
.ear-right {
  transform-origin: 190px 80px;
  animation: ear-flop-r 2s ease-in-out infinite;
}
@keyframes ear-flop-l {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(-5deg); }
}
@keyframes ear-flop-r {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(5deg); }
}

/* V-sign hand wave */
.v-hand {
  transform-origin: 250px 150px;
  animation: wave 1s ease-in-out infinite;
}
@keyframes wave {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(8deg); }
  75% { transform: rotate(-8deg); }
}

/* Wink */
.wink-eye {
  animation: wink 4s ease-in-out infinite;
}
@keyframes wink {
  0%, 85%, 100% { transform: scaleY(1); }
  90%, 95% { transform: scaleY(0.1); }
}

/* Leg kick */
.left-leg {
  transform-origin: 130px 310px;
  animation: kick-l 2s ease-in-out infinite;
}
.right-leg {
  transform-origin: 180px 310px;
  animation: kick-r 2s ease-in-out infinite;
}
@keyframes kick-l {
  0%, 100% { transform: rotate(5deg); }
  50% { transform: rotate(-5deg); }
}
@keyframes kick-r {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
</style>
</head>
<body>
<div class="container">
  <div class="stars" id="stars"></div>
  <div class="title">✌️ Jax 🐰</div>
  
  <div class="jax-wrapper">
    <svg class="jax" viewBox="0 0 320 450" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#9d4edd"/>
          <stop offset="100%" style="stop-color:#7b2cbf"/>
        </linearGradient>
        <linearGradient id="darkPurple" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#7b2cbf"/>
          <stop offset="100%" style="stop-color:#5a1d99"/>
        </linearGradient>
        <linearGradient id="overallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#d4465a"/>
          <stop offset="100%" style="stop-color:#b83a4c"/>
        </linearGradient>
        <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#f5d442"/>
          <stop offset="100%" style="stop-color:#e6b817"/>
        </linearGradient>
        <linearGradient id="earInner" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#e8b4f8"/>
          <stop offset="100%" style="stop-color:#d4a0e8"/>
        </linearGradient>
        <linearGradient id="shoeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#9d4edd"/>
          <stop offset="100%" style="stop-color:#6a2fa0"/>
        </linearGradient>
        <filter id="shadow">
          <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#00000066"/>
        </filter>
      </defs>

      <!-- LEFT EAR -->
      <g class="ear-left">
        <ellipse cx="120" cy="40" rx="16" ry="55" fill="url(#purpleGrad)" transform="rotate(-15, 120, 80)"/>
        <ellipse cx="120" cy="40" rx="8" ry="38" fill="url(#earInner)" transform="rotate(-15, 120, 80)"/>
      </g>

      <!-- RIGHT EAR -->
      <g class="ear-right">
        <ellipse cx="200" cy="35" rx="16" ry="55" fill="url(#purpleGrad)" transform="rotate(10, 200, 80)"/>
        <ellipse cx="200" cy="35" rx="8" ry="38" fill="url(#earInner)" transform="rotate(10, 200, 80)"/>
      </g>

      <!-- HEAD -->
      <ellipse cx="160" cy="130" rx="55" ry="50" fill="url(#purpleGrad)" filter="url(#shadow)"/>

      <!-- LEFT EYE (winking) -->
      <g class="wink-eye" style="transform-origin: 140px 120px">
        <ellipse cx="140" cy="120" rx="16" ry="12" fill="#f5d442"/>
        <ellipse cx="140" cy="120" rx="8" ry="10" fill="#1a1a2e"/>
        <ellipse cx="137" cy="116" rx="3" ry="3" fill="white" opacity="0.8"/>
      </g>

      <!-- RIGHT EYE -->
      <ellipse cx="180" cy="118" rx="16" ry="14" fill="#f5d442"/>
      <ellipse cx="182" cy="118" rx="8" ry="11" fill="#1a1a2e"/>
      <ellipse cx="179" cy="114" rx="3" ry="3" fill="white" opacity="0.8"/>

      <!-- EYEBROW -->
      <line x1="170" y1="100" x2="195" y2="104" stroke="#5a1d99" stroke-width="4" stroke-linecap="round"/>

      <!-- BIG GRIN -->
      <path d="M130 145 Q160 175 190 145" fill="#2a1040" stroke="#2a1040" stroke-width="2"/>
      <!-- TEETH -->
      <rect x="148" y="145" width="7" height="10" rx="1" fill="white"/>
      <rect x="157" y="145" width="7" height="10" rx="1" fill="white"/>
      <!-- Smirk line -->
      <path d="M190 145 Q198 140 200 135" fill="none" stroke="#5a1d99" stroke-width="2.5" stroke-linecap="round"/>

      <!-- BODY (purple) -->
      <ellipse cx="160" cy="210" rx="42" ry="55" fill="url(#purpleGrad)" filter="url(#shadow)"/>

      <!-- OVERALLS -->
      <path d="M125 220 Q125 280 160 280 Q195 280 195 220 L195 235 Q195 270 160 270 Q125 270 125 235 Z" fill="url(#overallGrad)"/>
      <!-- Straps -->
      <rect x="135" y="195" width="8" height="35" rx="3" fill="url(#overallGrad)" transform="rotate(5, 139, 195)"/>
      <rect x="177" y="195" width="8" height="35" rx="3" fill="url(#overallGrad)" transform="rotate(-5, 181, 195)"/>
      <!-- Buttons -->
      <circle cx="138" cy="232" r="4" fill="url(#yellowGrad)"/>
      <circle cx="182" cy="232" r="4" fill="url(#yellowGrad)"/>
      <!-- Pocket -->
      <rect x="148" y="248" width="24" height="15" rx="3" fill="none" stroke="#a03050" stroke-width="1.5"/>

      <!-- LEFT ARM (relaxed, going down/back) -->
      <g>
        <!-- Upper arm -->
        <rect x="85" y="190" width="18" height="50" rx="9" fill="url(#purpleGrad)" transform="rotate(30, 94, 190)"/>
        <!-- Forearm -->
        <rect x="68" y="225" width="15" height="45" rx="7" fill="url(#purpleGrad)" transform="rotate(20, 75, 225)"/>
        <!-- Hand -->
        <ellipse cx="62" cy="272" rx="13" ry="11" fill="url(#yellowGrad)"/>
      </g>

      <!-- RIGHT ARM (raised up, V sign!) -->
      <g class="v-hand">
        <!-- Upper arm -->
        <rect x="200" y="180" width="18" height="50" rx="9" fill="url(#purpleGrad)" transform="rotate(-45, 209, 180)"/>
        <!-- Forearm -->
        <rect x="230" y="145" width="15" height="45" rx="7" fill="url(#purpleGrad)" transform="rotate(-30, 237, 145)"/>
        <!-- Hand palm -->
        <ellipse cx="252" cy="118" rx="14" ry="12" fill="url(#yellowGrad)"/>
        
        <!-- V SIGN FINGERS! ✌️ -->
        <!-- Index finger -->
        <rect x="242" y="80" width="8" height="35" rx="4" fill="url(#yellowGrad)" transform="rotate(-12, 246, 97)"/>
        <!-- Middle finger -->
        <rect x="256" y="78" width="8" height="35" rx="4" fill="url(#yellowGrad)" transform="rotate(12, 260, 95)"/>
        <!-- Folded ring finger -->
        <ellipse cx="265" cy="122" rx="6" ry="5" fill="#e6b817"/>
        <!-- Thumb -->
        <ellipse cx="240" cy="124" rx="6" ry="5" fill="#e6b817" transform="rotate(-20, 240, 124)"/>
      </g>

      <!-- LEFT LEG -->
      <g class="left-leg">
        <!-- Upper leg -->
        <rect x="125" y="270" width="22" height="50" rx="10" fill="url(#overallGrad)" transform="rotate(25, 136, 270)"/>
        <!-- Lower leg -->
        <rect x="108" y="305" width="18" height="45" rx="9" fill="url(#overallGrad)" transform="rotate(15, 117, 305)"/>
        <!-- Shoe -->
        <ellipse cx="95" cy="352" rx="20" ry="10" fill="url(#shoeGrad)" transform="rotate(15, 95, 352)"/>
      </g>

      <!-- RIGHT LEG -->
      <g class="right-leg">
        <!-- Upper leg -->
        <rect x="170" y="268" width="22" height="50" rx="10" fill="url(#overallGrad)" transform="rotate(-15, 181, 268)"/>
        <!-- Lower leg -->
        <rect x="182" y="305" width="18" height="45" rx="9" fill="url(#overallGrad)" transform="rotate(-25, 191, 305)"/>
        <!-- Shoe -->
        <ellipse cx="200" cy="350" rx="20" ry="10" fill="url(#shoeGrad)" transform="rotate(-20, 200, 350)"/>
      </g>
    </svg>
  </div>
</div>

<script>
// Generate stars
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const star = document.createElement('div');
  star.className = 'star';
  star.style.left = Math.random() * 100 + '%';
  star.style.top = Math.random() * 100 + '%';
  star.style.width = (Math.random() * 3 + 1) + 'px';
  star.style.height = star.style.width;
  star.style.animationDelay = (Math.random() * 3) + 's';
  star.style.animationDuration = (Math.random() * 2 + 2) + 's';
  starsEl.appendChild(star);
}
</script>
</body>
</html>
