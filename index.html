<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Rubik',sans-serif;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column}

#tent-bg{position:absolute;width:100%;height:100%;top:0;left:0}
/* Characters */
.char{position:absolute;bottom:10%;transition:transform 0.5s ease, opacity 0.5s;transform-origin:bottom center}
.char svg{width:100%;height:100%}
/* Dialogue */
#dialogue-box{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:3px solid #FFD700;border-radius:20px;padding:15px 25px;min-width:280px;max-width:85vw;text-align:center;z-index:100;opacity:0;transition:opacity 0.3s}

#speaker-name{color:#FFD700;font-weight:900;font-size:1.1em;margin-bottom:5px}
#dialogue-text{color:#fff;font-size:1em;min-height:1.5em;direction:rtl}

#progress-wrap{position:absolute;bottom:0;left:0;width:100%;height:8px;background:rgba(0,0,0,0.5);z-index:200}
#progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#ff0,#f0f,#0ff,#ff0);transition:width 0.5s linear}

#start-screen h2{font-size:1.3em;color:#fff;margin-bottom:30px;text-align:center}
#start-screen .play-btn{font-size:1.5em;background:linear-gradient(135deg,#8B00FF,#FF1493);color:#fff;border:none;padding:15px 40px;border-radius:50px;cursor:pointer;animation:pulse 1.5s infinite;font-family:'Rubik',sans-serif;font-weight:700}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
/* Transitions */
.glitch-transition{animation:glitchTrans 0.6s}
@keyframes glitchTrans{0%{filter:none}20%{filter:hue-rotate(90deg) saturate(3)}40%{filter:invert(1) hue-rotate(180deg)}60%{filter:hue-rotate(270deg) brightness(2)}80%{filter:saturate(5) contrast(2)}100%{filter:none}}
.fade-black{animation:fadeBlack 1s forwards}
@keyframes fadeBlack{0%{opacity:1}50%{opacity:0}100%{opacity:1}}
/* Screen shake */
.shake{animation:shake 0.5s}
@keyframes shake{0%,100%{transform:translate(0)}10%{transform:translate(-8px,4px)}20%{transform:translate(8px,-4px)}30%{transform:translate(-6px,6px)}40%{transform:translate(6px,-2px)}50%{transform:translate(-4px,4px)}60%{transform:translate(4px,-4px)}70%{transform:translate(-2px,2px)}80%{transform:translate(2px,-2px)}90%{transform:translate(-1px,1px)}}
.shake-heavy{animation:shakeH 0.8s}
@keyframes shakeH{0%,100%{transform:translate(0) rotate(0)}10%{transform:translate(-15px,8px) rotate(-2deg)}20%{transform:translate(15px,-8px) rotate(2deg)}30%{transform:translate(-12px,12px) rotate(-3deg)}40%{transform:translate(12px,-4px) rotate(1deg)}50%{transform:translate(-8px,8px) rotate(-1deg)}60%{transform:translate(8px,-8px) rotate(2deg)}70%{transform:translate(-4px,4px) rotate(-1deg)}80%{transform:translate(4px,-4px) rotate(0deg)}90%{transform:translate(-2px,2px) rotate(0)}100%{transform:translate(0)}}

@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
@keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
@keyframes armWave{0%,100%{transform:rotate(0)}50%{transform:rotate(-20deg)}}
/* Mouth animation */
@keyframes talk{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.3)}}

/* Glitch zone bg */
.glitch-bg{animation:glitchBg 2s infinite}
@keyframes glitchBg{0%,100%{filter:none}25%{filter:hue-rotate(60deg)}50%{filter:hue-rotate(120deg) saturate(1.5)}75%{filter:hue-rotate(240deg)}}

// ===== AUDIO ENGINE =====
let audioCtx;
function initAudio(){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

function playTone(freq,dur,type='sine',vol=0.15){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  o.connect(g);g.connect(audioCtx.destination);
  o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.stop(audioCtx.currentTime+dur);
}
function playChord(freqs,dur,type='sine',vol=0.08){freqs.forEach(f=>playTone(f,dur,type,vol))}
function dramaticReveal(){playChord([261,329,392,523],1.5,'triangle',0.12)}
function glitchSound(){for(let i=0;i<5;i++)setTimeout(()=>playTone(Math.random()*2000+200,0.1,'sawtooth',0.1),i*60)}
function comedyHonk(){playTone(300,0.15,'square',0.12);setTimeout(()=>playTone(350,0.15,'square',0.12),150);setTimeout(()=>playTone(250,0.2,'square',0.12),300)}
function cymbalCrash(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.5,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/5000);
  const s=audioCtx.createBufferSource(),g=audioCtx.createGain();
  s.buffer=buf;g.gain.value=0.2;s.connect(g);g.connect(audioCtx.destination);s.start();
}
function tensionDrone(){playTone(80,3,'sawtooth',0.06);playTone(82,3,'sawtooth',0.06)}
function popSound(){playTone(800,0.05,'sine',0.2);setTimeout(()=>playTone(400,0.1,'sine',0.15),50)}
function victorySound(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3,'triangle',0.12),i*150))}
function portalSound(){for(let i=0;i<8;i++)setTimeout(()=>playTone(300+i*100,0.3,'sine',0.08),i*80)}
function monsterRoar(){playTone(60,1,'sawtooth',0.2);playTone(65,1,'sawtooth',0.15);setTimeout(()=>playTone(50,0.8,'square',0.15),200)}
function explosionSound(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.8,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/3000);
  const s=audioCtx.createBufferSource(),g=audioCtx.createGain();s.buffer=buf;g.gain.value=0.3;s.connect(g);g.connect(audioCtx.destination);s.start();
}
function ambientCircus(){
  if(!audioCtx)return;
  const notes=[262,294,330,349,392,440,494,523];
  let i=0;
  const iv=setInterval(()=>{
    if(i>=16||!window.showRunning){clearInterval(iv);return}
    playTone(notes[i%8],0.3,'triangle',0.03);i++;
  },400);
}

// ===== DRAW BACKGROUNDS =====
function drawCircusTent(){
  resizeCanvas();
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  // Tent stripes
  const colors = ['#8B0000','#FFD700','#8B0000','#FFD700','#8B0000','#FFD700','#8B0000','#FFD700'];
  const stripeW = w / colors.length;
  // Converging stripes from top center
  for(let i=0;i<colors.length;i++){
    ctx.beginPath();
    ctx.moveTo(w/2, 0);
    ctx.lineTo(i*stripeW, h);
    ctx.lineTo((i+1)*stripeW, h);
    ctx.closePath();
    ctx.fillStyle = colors[i];
    ctx.fill();
  }
  // Darken bottom
  const grd = ctx.createLinearGradient(0,h*0.5,0,h);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,w,h);
  // Stage floor
  ctx.fillStyle = '#3D1F00';
  ctx.fillRect(0, h*0.78, w, h*0.22);
  // Stage edge
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(0, h*0.78, w, 4);
  // Curtains left/right
  ctx.fillStyle = 'rgba(139,0,0,0.5)';
  ctx.fillRect(0,0,w*0.06,h);
  ctx.fillRect(w*0.94,0,w*0.06,h);
  // Drape top
  ctx.beginPath();
  ctx.moveTo(0,0);
  for(let x=0;x<=w;x+=w/6){
    ctx.quadraticCurveTo(x+w/12, 50, x+w/6, 0);
  }
  ctx.lineTo(w,60);ctx.lineTo(0,60);ctx.closePath();
  ctx.fillStyle='#8B0000';ctx.fill();
  // Lights
  for(let i=0;i<8;i++){
    const lx = w*0.1 + i*(w*0.8/7);
    ctx.beginPath();ctx.arc(lx, 55, 8, 0, Math.PI*2);
    ctx.fillStyle = ['#FF0','#FF69B4','#00FF00','#00BFFF','#FF0','#FF69B4','#00FF00','#00BFFF'][i];
    ctx.fill();
    ctx.beginPath();ctx.arc(lx, 55, 12, 0, Math.PI*2);
    ctx.fillStyle = `rgba(${i%2?255:0},${i%3?255:100},${i%2?100:255},0.15)`;
    ctx.fill();
  }
  // Top star
  drawStar(ctx, w/2, 15, 12, 6, 5);
}

function drawGlitchZone(){
  resizeCanvas();
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  // Dark void
  ctx.fillStyle = '#0a0015';
  ctx.fillRect(0,0,w,h);
  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,255,0.1)';
  ctx.lineWidth = 1;
  for(let x=0;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
  for(let y=0;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
  // Random glitch blocks
  for(let i=0;i<20;i++){
    ctx.fillStyle = `rgba(${Math.random()*255|0},${Math.random()*50|0},${Math.random()*255|0},0.15)`;
    ctx.fillRect(Math.random()*w, Math.random()*h, Math.random()*100+20, Math.random()*30+5);
  }
  // Floor
  ctx.fillStyle = '#1a0030';
  ctx.fillRect(0, h*0.78, w, h*0.22);
  // Glitch floor lines
  for(let i=0;i<15;i++){
    ctx.strokeStyle = `rgba(${Math.random()>0.5?255:0},0,255,0.2)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(Math.random()*w, h*0.78+Math.random()*h*0.22);
    ctx.lineTo(Math.random()*w, h*0.78+Math.random()*h*0.22);
    ctx.stroke();
  }
}

function drawStar(ctx,cx,cy,or,ir,n){
  ctx.beginPath();
  for(let i=0;i<n*2;i++){
    const r=i%2===0?or:ir;
    const a=Math.PI/n*i-Math.PI/2;
    ctx[i?'lineTo':'moveTo'](cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath();ctx.fillStyle='#FFD700';ctx.fill();
}

// ===== CHARACTER MANAGEMENT =====
function placeChar(id, x, expr='default', visible=true, extraStyle=''){
  if(!charElements[id]){
    const div = document.createElement('div');
    div.className = 'char';
    div.id = 'char-'+id;
    scene.appendChild(div);
    charElements[id] = div;
  }
  const el = charElements[id];
  el.innerHTML = CHARS[id].svg(expr);
  el.style.left = x + '%';
  el.style.opacity = visible ? '1' : '0';
  el.style.display = visible ? 'block' : 'none';
  if(extraStyle) el.style.cssText += ';' + extraStyle;
}

function hideChar(id){
  if(charElements[id]){
    charElements[id].style.opacity='0';
    setTimeout(()=>{if(charElements[id])charElements[id].style.display='none'},500);
  }
}
function hideAllChars(){Object.keys(charElements).forEach(hideChar)}

function setCharTalking(id, talking){
  if(charElements[id]) charElements[id].classList.toggle('talking', talking);
}

function bounceChar(id){
  if(!charElements[id]) return;
  charElements[id].style.animation='bounce 0.5s ease 2';
  setTimeout(()=>{charElements[id].style.animation=''},1200);
}

function wobbleChar(id){
  if(!charElements[id]) return;
  charElements[id].style.animation='wobble 0.4s ease 3';
  setTimeout(()=>{charElements[id].style.animation=''},1500);
}

function floatChar(id){
  if(!charElements[id]) return;
  charElements[id].style.animation='float 2s ease infinite';
}

// ===== CAMERA =====
function camera(transform, dur=800){
  W.style.transition = `transform ${dur}ms cubic-bezier(.25,.46,.45,.94)`;
  W.style.transform = transform;
}
function cameraReset(dur=800){camera('none',dur)}
function cameraZoom(x,y,scale,dur=800){camera(`scale(${scale}) translate(${x}%,${y}%)`,dur)}
function cameraPan(x,dur=800){camera(`translateX(${x}%)`,dur)}

// ===== DIALOGUE =====
function showDialogue(speaker, text, duration, soundFn){
  return new Promise(resolve=>{
    speakerEl.textContent = speaker;
    speakerEl.style.color = Object.values(CHARS).find(c=>c.name===speaker)?.color || '#FFD700';
    textEl.textContent = '';
    dlgBox.classList.add('visible');

    // Find char by name and set talking
    const charId = Object.keys(CHARS).find(k=>CHARS[k].name===speaker);
    if(charId) setCharTalking(charId, true);
    if(soundFn) soundFn();

    // Typewriter
    let i=0;
    const speed = Math.max(30, (duration*0.7*1000)/text.length);
    const tw = setInterval(()=>{
      if(i < text.length){textEl.textContent += text[i]; i++}
      else clearInterval(tw);
    }, speed);

    setTimeout(()=>{
      if(charId) setCharTalking(charId, false);
      clearInterval(tw);
      textEl.textContent = text;
    }, duration*1000*0.9);

    setTimeout(()=>{
      dlgBox.classList.remove('visible');
      resolve();
    }, duration*1000);
  });
}

function hideDialogue(){dlgBox.classList.remove('visible')}

function narrate(text, duration){
  return new Promise(resolve=>{
    speakerEl.textContent = '';
    textEl.textContent = '';
    dlgBox.classList.add('visible');
    let i=0;
    const speed = Math.max(40, (duration*0.7*1000)/text.length);
    const tw = setInterval(()=>{
      if(i<text.length){textEl.textContent+=text[i];i++}else clearInterval(tw);
    },speed);
    setTimeout(()=>{dlgBox.classList.remove('visible');resolve()},duration*1000);
  });
}

// ===== PROGRESS =====
function updateProgress(){
  if(!showRunning) return;
  const elapsed = (Date.now()-startTime)/1000;
  const pct = Math.min(100, (elapsed/TOTAL_DURATION)*100);
  progressBar.style.width = pct+'%';
  if(showRunning) requestAnimationFrame(updateProgress);
}

  cameraZoom(-20, 0, 1.3);
  await showDialogue('פומני', '!הכל לא בסדר! הצבעים! הצורות! מה קורה כאן', 4.5, glitchSound);
  cameraReset();

  cameraZoom(-5, 0, 1.2);
  placeChar('jax', 30, 'smirk');
  await showDialogue("ג'קס", '...תירגעי, זה סתם משחק. תראי, כאילו הכל פיקסלים', 4);
  bounceChar('jax');
  cameraReset();

  cameraZoom(5, 0, 1.15);
  placeChar('ragatha', 45, 'worried');
  await showDialogue('רגאתה', '!חברים, בואו נישאר ביחד. הכל יהיה בסדר', 4);
  cameraReset();

  glitchSound();
  screenShake();
  await wait(0.5);

  // Kinger finds the door
  cameraZoom(8, -5, 1.4);
  placeChar('kinger', 58, 'crazy');
  wobbleChar('kinger');
  tensionDrone();
  await showDialogue('קינגר', '!רגע... רגע... מה זה?! דלת! דלת שלא אמורה להיות כאן', 5, ()=>playTone(150,1,'triangle',0.08));
  cameraReset();

  screenShake();
  glitchSound();
  placeChar('gangle', 5, 'tragedy');
  wobbleChar('gangle');
  await showDialogue('גנגל', '!...המסכה שלי! היא... נשברה! לא... *בוכה*', 4);

  // Tension builds
  tensionDrone();
  setGlitchOverlay(true);
  glitchOverlay.style.opacity = '0.7';
  await narrate('...צלילים מוזרים בוקעים מכל כיוון. משהו מתקרב', 3.5);
  glitchSound();
  screenShake();
  await wait(1);

  // ===== ACT 4: THE BUG MONSTER (3:30 - 4:30) =====
  await glitchTransition();
  const monster = createMonster();
  monster.style.display = 'block';
  monsterRoar();
  screenShake(true);

  await narrate('!מפלצת גליצ\' ענקית מופיעה', 2.5);

  // Everyone panics - move chars to sides
  placeChar('pomni', 5, 'panic');
  placeChar('ragatha', 10, 'worried');
  placeChar('kinger', 80, 'crazy');
  placeChar('gangle', 85, 'tragedy');
  placeChar('caine', 75, 'surprised');

  screenShake(true);
  glitchSound();
  cameraZoom(0, 0, 0.9, 500);

  await showDialogue('פומני', '!!!מה זה הדבר הזה?! עזרה', 3, ()=>playTone(800,0.3,'square',0.1));

  cameraZoom(0, 0, 1.1);
  // Bubble pops!
  popSound();
  if(charElements.bubble){
    charElements.bubble.style.animation = 'popAnim 0.5s forwards';
  }
  await showDialogue('באבל', '...אוי לא! אני מתפוצ-', 2, popSound);
  hideChar('bubble');
  cymbalCrash();
  await narrate('!באבל התפוצץ', 2);

  cameraZoom(15, -5, 1.3);
  placeChar('caine', 75, 'surprised');
  await showDialogue('קיין', '!זה לא היה בתוכנית! בכלל לא', 3);
  cameraReset();

  // Jax steps up
  cameraZoom(0, -5, 1.4, 1000);
  placeChar('jax', 40, 'default');
  bounceChar('jax');
  await showDialogue("ג'קס", '.תנו לי. יש לי רעיון', 3, ()=>playChord([440,554,659],0.5,'triangle',0.1));

  // Jax fights monster
  placeChar('jax', 45, 'smirk');
  await narrate('ג\'קס רץ לעבר המפלצת... תופס חתיכת קוד שבורה...', 3);
  glitchSound();

  await showDialogue("ג'קס", '!אכלי גליצ\', מפלצת', 2.5);

  // Monster defeated - explosion
  explosionSound();
  screenShake(true);
  glitchOverlay.style.opacity = '1';
  await wait(0.3);
  monster.style.display = 'none';
  // Flash
  W.style.filter = 'brightness(3)';
  setTimeout(()=>W.style.filter='none', 300);
  victorySound();

  await narrate('!המפלצת מתפוצצת לאלפי פיקסלים', 3);
  cameraReset();
  setGlitchOverlay(false);
  scene.classList.remove('glitch-bg');

  placeChar('ragatha', 20, 'default');
  await showDialogue('רגאתה', '!ג\'קס, אתה גיבור!', 2.5);

  placeChar('jax', 45, 'smirk');
  bounceChar('jax');
  await showDialogue("ג'קס", '...אני יודע', 2, comedyHonk);

  await wait(0.5);

  // ===== ACT 5: THE TWIST (4:30 - 5:00) =====
  await fadeTransition();
  drawGlitchZone(); // Still in glitch zone but calmer

  // Crystal appears
  placeChar('jax', 25, 'default');
  placeChar('pomni', 40, 'default');
  placeChar('ragatha', 55, 'default');
  placeChar('caine', 70, 'default');
  placeChar('kinger', 10, 'default');
  placeChar('gangle', 85, 'default');
  placeChar('zooble', 0, 'default');

  // Crystal SVG
  const crystal = document.createElement('div');
  crystal.style.cssText = 'position:absolute;left:50%;top:25%;transform:translateX(-50%);z-index:45';
  crystal.innerHTML = `<svg viewBox="0 0 60 80" width="60" height="80">
    <polygon points="30,5 50,30 45,70 15,70 10,30" fill="#FFD700" opacity="0.8" stroke="#FFF" stroke-width="2">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="30,5 40,30 30,65 20,30" fill="#FFF8DC" opacity="0.5"/>
  </svg>`;
  scene.appendChild(crystal);

  dramaticReveal();
  cameraZoom(0, -10, 1.3);
  await narrate('...ואז, הם מצאו אותו... הקריסטל הדיגיטלי', 3.5);

  await showDialogue('פומני', '!זה הוא! מצאנו אותו', 2.5);

  cameraZoom(0, -15, 1.6);
  await wait(1);

  // The twist!
  comedyHonk();
  placeChar('caine', 70, 'surprised');
  cameraZoom(15, -5, 1.3);
  await showDialogue('קיין', '!רגע... רגע רגע רגע... זו... זו השן שלי', 4, comedyHonk);
  cameraReset();

  cymbalCrash();
  crystal.remove();
  await showDialogue('קיין', '!אופס! קריסטל לא נכון! סליחה', 3, comedyHonk);

  // Everyone annoyed
  placeChar('pomni', 40, 'panic');
  await showDialogue('פומני', '?!מה?! עשינו את כל זה בשביל שן?!', 3);

  placeChar('ragatha', 55, 'worried');
  await showDialogue('רגאתה', '...קיין... אתה לא רציני', 2.5);

  wobbleChar('kinger');
  placeChar('kinger', 10, 'crazy');
  await showDialogue('קינגר', '!שן! שן! הכל היה בגלל שן!!! אאאא', 3);

  // Jax wink
  cameraZoom(0, -5, 1.4);
  placeChar('jax', 25, 'wink');
  bounceChar('jax');
  await showDialogue("ג'קס", '✌️ ...ידעתי את זה כל הזמן', 3, comedyHonk);
  cameraReset();

  placeChar('pomni', 40, 'panic');
  screenShake();
  await showDialogue('פומני', '!!!תוציאו אותי מפה', 3, ()=>playTone(600,0.5,'square',0.08));

  // Glitch hard ending
  glitchSound();
  screenShake(true);
  glitchOverlay.style.opacity = '1';
  await wait(0.5);
  glitchSound();
  await wait(0.5);

  // Fade to end
  W.style.transition = 'opacity 1.5s';
  W.style.opacity = '0';
  await wait(2);

  // Show end card
  endCard.style.display = 'flex';
  showRunning = false;
  progressBar.style.width = '100%';

  // Place all chars in end card
  const charRow = document.createElement('div');
  charRow.style.cssText = 'display:flex;gap:5px;margin-top:20px;justify-content:center;flex-wrap:wrap';
  ['jax','pomni','caine','ragatha','kinger','gangle','zooble','bubble'].forEach(id=>{
    const d = document.createElement('div');
    d.innerHTML = CHARS[id].svg('default');
    d.style.cssText = 'width:50px;height:80px';
    d.querySelector('svg').style.width='50px';
    d.querySelector('svg').style.height='80px';
    charRow.appendChild(d);
  });
  endCard.appendChild(charRow);
}
</script>
</body>
</html>
