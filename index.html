<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Amazing Digital Circus - Episode: The Glitch 🎪</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Rubik',sans-serif;width:100vw;height:100vh}
#stage{position:relative;width:100vw;height:100vh;overflow:hidden}
canvas#bgCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
#sceneLayer{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;display:flex;align-items:center;justify-content:center}
#characters{position:absolute;bottom:5%;width:100%;display:flex;justify-content:center;gap:2vw;z-index:2}
.char-slot{width:25vmin;height:35vmin;transition:all .5s;opacity:0;transform:translateY(40px)}
.char-slot.visible{opacity:1;transform:translateY(0)}
.char-slot.shake{animation:charShake .1s infinite}
@keyframes charShake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}50%{transform:translate(3px,-2px)}75%{transform:translate(-2px,-3px)}}
#dialogue{position:absolute;top:8%;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(0,0,0,.85);border:3px solid #fff;border-radius:20px;padding:20px 30px;
  max-width:85vw;text-align:center;color:#fff;font-size:clamp(16px,4vmin,28px);
  opacity:0;transition:opacity .4s;pointer-events:none;min-width:50vw}
#dialogue.visible{opacity:1}
#dialogue .speaker{font-weight:900;margin-bottom:6px;font-size:clamp(14px,3vmin,20px)}
#dialogue .speaker.jax{color:#9b59b6}
#dialogue .speaker.pomni{color:#e74c3c}
#dialogue .speaker.caine{color:#f1c40f}
#progressBar{position:absolute;bottom:0;left:0;height:4px;background:linear-gradient(90deg,#e74c3c,#f1c40f,#9b59b6);z-index:20;transition:width .3s}
#title-screen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:30;
  background:radial-gradient(circle,#1a0a2e,#000);display:flex;flex-direction:column;
  align-items:center;justify-content:center;transition:opacity 1s}
#title-screen h1{font-size:clamp(20px,6vmin,48px);color:#f1c40f;text-shadow:0 0 30px #f1c40f80;margin-bottom:10px;text-align:center;padding:0 10px}
#title-screen h2{font-size:clamp(14px,4vmin,30px);color:#e74c3c;margin-bottom:30px;text-align:center}
#startBtn{padding:15px 40px;font-size:clamp(16px,4vmin,24px);background:linear-gradient(135deg,#9b59b6,#e74c3c);
  color:#fff;border:none;border-radius:50px;cursor:pointer;font-family:'Rubik';font-weight:700;
  animation:pulse 2s infinite;box-shadow:0 0 30px #9b59b680}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
#glitchOverlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:15;pointer-events:none;opacity:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,.03) 2px,rgba(0,255,0,.03) 4px);
  mix-blend-mode:screen}
#flashOverlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:16;pointer-events:none;opacity:0;background:#fff}
#endScreen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:30;background:rgba(0,0,0,.95);
  display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
#endScreen h1{font-size:clamp(20px,6vmin,42px);color:#f1c40f;margin-bottom:15px}
#endScreen p{font-size:clamp(14px,4vmin,24px);color:#e74c3c}
</style>
</head>
<body>

  <div id="title-screen">

    <h2>Episode: The Glitch - הגליץ'</h2>
    <button id="startBtn">▶ התחל את ההרפתקה!</button>

    <p>פרק 9 - 4 ביוני 🎪</p>

// Setup characters
document.getElementById('charJax').innerHTML = SVGS.jax;
document.getElementById('charPomni').innerHTML = SVGS.pomni;
document.getElementById('charCaine').innerHTML = SVGS.caine;

// Canvas background
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener('resize',resize);resize();

// Background state
let bgHue=260, bgIntensity=0.3, bgGlitch=0, particles=[];
class Particle{
  constructor(){this.reset()}
  reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.vx=(Math.random()-.5)*2;this.vy=(Math.random()-.5)*2;
    this.size=Math.random()*3+1;this.life=Math.random()*200+100;this.maxLife=this.life;
    this.hue=Math.random()*60+bgHue-30}
  update(){this.x+=this.vx;this.y+=this.vy;this.life--;
    if(this.life<=0||this.x<0||this.x>W||this.y<0||this.y>H)this.reset()}
  draw(){const a=this.life/this.maxLife;
    ctx.fillStyle=`hsla(${this.hue},80%,60%,${a*0.6})`;
    ctx.fillRect(this.x,this.y,this.size,this.size)}
}
for(let i=0;i<80;i++)particles.push(new Particle());

function drawBg(t){
  ctx.fillStyle=`hsl(${bgHue},30%,${bgIntensity*15}%)`;
  ctx.fillRect(0,0,W,H);
  // grid
  ctx.strokeStyle=`hsla(${bgHue+40},60%,40%,0.08)`;
  ctx.lineWidth=1;
  const gs=40;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  // particles
  particles.forEach(p=>{p.update();p.draw()});
  // glitch scanlines
  if(bgGlitch>0){
    for(let i=0;i<bgGlitch*20;i++){
      const y=Math.random()*H;const h=Math.random()*4+1;
      ctx.fillStyle=`rgba(${Math.random()>0.5?'0,255,0':'255,0,0'},${bgGlitch*0.15})`;
      ctx.fillRect(Math.random()*50-25,y,W+50,h);
    }
  }
}

let animFrame;
function renderLoop(t){drawBg(t);animFrame=requestAnimationFrame(renderLoop)}
renderLoop(0);

// Audio context for sound effects
let audioCtx;
function initAudio(){audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type='sine',vol=0.1){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;g.gain.value=vol;
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
}
function glitchSound(){playTone(80+Math.random()*200,.15,'sawtooth',.08)}
function dramaticChord(){[220,277,330,440].forEach((f,i)=>setTimeout(()=>playTone(f,.8,'triangle',.06),i*100))}
function mysteryTone(){playTone(440,.5,'sine',.05);setTimeout(()=>playTone(554,.5,'sine',.04),200)}

// Scene engine
const dialogue=document.getElementById('dialogue');
const progress=document.getElementById('progressBar');
let currentScene=0, sceneTimeout;

function showChar(id,show){
  const el=document.getElementById('char'+id);
  if(show)el.classList.add('visible');else el.classList.remove('visible');
}
function shakeChar(id,on){
  const el=document.getElementById('char'+id);
  if(on)el.classList.add('shake');else el.classList.remove('shake');
}
function say(speaker,text,cls){
  dialogue.querySelector('.speaker').textContent=speaker;
  dialogue.querySelector('.speaker').className='speaker '+(cls||'');
  dialogue.querySelector('.text').textContent=text;
  dialogue.classList.add('visible');
}
function hideSay(){dialogue.classList.remove('visible')}
function flash(dur=200){
  const f=document.getElementById('flashOverlay');
  f.style.opacity='1';setTimeout(()=>f.style.opacity='0',dur);
}
function setGlitch(level){
  bgGlitch=level;
  document.getElementById('glitchOverlay').style.opacity=level>0?Math.min(level*0.3,1):0;
}
function shakeScreen(dur=500){
  document.getElementById('stage').style.animation=`charShake ${dur/5}ms ${Math.floor(dur/50)} linear`;
  setTimeout(()=>document.getElementById('stage').style.animation='',dur);
}

const scenes = [
  // Scene 1: Opening - dark circus
  [0, ()=>{bgHue=260;bgIntensity=0.1;hideSay();showChar('Jax',false);showChar('Pomni',false);showChar('Caine',false)}],

  [3500, ()=>{showChar('Pomni',true);say('פומני','ר-רגע... יציאה מהסירקוס?! זה... זה אמיתי?! 😰','pomni')}],
  [3500, ()=>say('ג\'קס','רגועה פומני, זה בטח עוד טריק של קיין. כרגיל. 😏','jax')],
  [3000, ()=>say('קיין','הו הו הו! הפעם זה אמיתי לגמרי! ...אולי. 😁','caine')],
  
  // Scene 3: Entering the glitchy world
  [3500, ()=>{hideSay();bgHue=120;bgIntensity=0.6;setGlitch(0.5);flash(300);
    glitchSound();playTone(150,.3,'sawtooth',.05)}],
  [1500, ()=>say('פומני','מה... מה קורה?! הכל נראה... שבור! 😱','pomni')],
  [3000, ()=>{setGlitch(1);say('ג\'קס','וואו, אחלה עיצוב. מי עשה פה את הגרפיקה? 🤣','jax')}],

  [4000, ()=>{bgHue=0;bgIntensity=0.8;setGlitch(2);shakeScreen(800);
    say('פומני','הרצפה! היא נעלמת! אני לא יכולה... לא יכולה... 😭','pomni');shakeChar('Pomni',true)}],
  [3500, ()=>{shakeChar('Pomni',false);say('ג\'קס','דרמה קווין. הרצפה פה, את פה, הכל בסדר. שנמשיך? 😎','jax')}],
  [3500, ()=>{bgHue=300;setGlitch(1);say('ג\'קס','רגע... מה זה שם? ✨ נראה כמו... דלת זהובה?','jax');mysteryTone()}],
  [3000, ()=>say('פומני','היציאה הזהובה?! ג\'קס, מצאת אותה?! 🤩','pomni')],
  [3000, ()=>say('ג\'קס','חחח רגועה, בואי נבדוק קודם. אני לא סומך על שום דבר פה. 🤔','jax')],
  
  // Scene 5: Glitch monster appears!
  [3500, ()=>{hideSay();bgHue=0;bgIntensity=1;setGlitch(3);shakeScreen(1500);flash(500);
    dramaticChord();glitchSound();
    setTimeout(glitchSound,200);setTimeout(glitchSound,400)}],
  [2000, ()=>{say('','⚠️ !מפלצת גליץ\' ענקית מופיעה ⚠️','');
    shakeChar('Pomni',true);shakeChar('Jax',true)}],
  [2500, ()=>{say('פומני','אאאאה!! מה זה הדבר הזה?! זה רוצה לאכול אותנו!! 😱😱😱','pomni');
    shakeScreen(600)}],
  [3000, ()=>{shakeChar('Jax',false);say('ג\'קס','אוקיי, זה קצת פחות מצחיק ממה שחשבתי... 😅','jax')}],
  [3000, ()=>{say('קיין','אופס! לא תכננתי את הדבר הזה! ...או שכן? 🤭','caine');bgHue=40}],
  
  // Scene 6: Jax is brave!
  [3500, ()=>{setGlitch(2);shakeChar('Pomni',false);
    say('ג\'קס','תשמעי פומני, תישארי מאחוריי. אני אטפל בזה. 💪','jax')}],
  [3000, ()=>say('פומני','ג\'קס?! מה... מה אתה עושה?! 😧','pomni')],
  [2500, ()=>{flash(300);setGlitch(4);shakeScreen(1000);
    say('ג\'קס','!הייייי, מפלצת! רוצה לראות טריק קסם? ✌️🐰','jax');
    dramaticChord()}],
  [3000, ()=>{setGlitch(1);bgIntensity=0.5;bgHue=280;flash(600);
    say('','...המפלצת נעלמת בפיצוץ של פיקסלים! 💥✨','')}],
  [3000, ()=>say('פומני','ג\'קס!! איך עשית את זה?! 🤯','pomni')],
  [2500, ()=>say('ג\'קס','מה, את לא יודעת? ארנבים סגולים זה הקריפטונייט של גליצ\'ים. ברור. 😏✌️','jax')],
  
  // Scene 7: The Golden Exit - it's fake!
  [4000, ()=>{bgHue=50;bgIntensity=0.7;setGlitch(0.3);mysteryTone();
    say('פומני','הנה! הדלת הזהובה! יציאה מהסירקוס! 🚪✨','pomni')}],
  [3500, ()=>say('ג\'קס','ממממ... משהו פה מריח לי לא טוב... 🤨','jax')],
  [3000, ()=>{flash(400);setGlitch(2);shakeScreen(500);bgHue=0;
    say('קיין','הא הא הא!! הפתעה!! היציאה הזהובה... מזויפת! 🤣🎪','caine');
    playTone(200,.5,'square',.06)}],
  [3500, ()=>{say('פומני','לא!! לא לא לא!! קיין!! למה?! 😭😭','pomni');shakeChar('Pomni',true)}],
  [3000, ()=>{shakeChar('Pomni',false);bgHue=270;setGlitch(0.5);bgIntensity=0.4;
    say('קיין','כי, חביבתי... הסירקוס הוא הבית שלכם! ולעולם לא תעזבו! 😁🎪','caine')}],
  
  // Scene 8: Jax's twist
  [4000, ()=>{say('ג\'קס','חחחחח... אתה יודע קיין, ידעתי מההתחלה. 😏','jax');bgHue=260;setGlitch(0)}],
  [3000, ()=>say('קיין','...מה? 😐','caine')],
  [2500, ()=>say('ג\'קס','שהיציאה מזויפת. שהמפלצת שלך מחזור. שהכל משחק. 🤷‍♂️','jax')],
  [3500, ()=>say('פומני','ג\'קס... אם ידעת... למה באת?! 😤','pomni')],

  [3500, ()=>{say('פומני','...ג\'קס... 🥺','pomni')}],
  
  // Scene 9: Cliffhanger ending
  [3500, ()=>{bgHue=0;bgIntensity=0.2;setGlitch(3);shakeScreen(2000);flash(300);

  [3000, ()=>{bgIntensity=0;setGlitch(0);hideSay();

  [3000, ()=>{
    document.getElementById('endScreen').style.display='flex';

  }],

// Calculate total duration for progress bar
let totalDuration = 0;
const cumulativeTimes = [];
scenes.forEach(([delay])=>{totalDuration+=delay;cumulativeTimes.push(totalDuration)});

function runScenes(){
  let elapsed=0;
  scenes.forEach(([delay,fn],i)=>{
    elapsed+=delay;
    setTimeout(()=>{
      fn();
      progress.style.width=((i+1)/scenes.length*100)+'%';
    },elapsed);
  });
}

// Start
document.getElementById('startBtn').addEventListener('click',()=>{
  initAudio();
  const ts=document.getElementById('title-screen');
  ts.style.opacity='0';setTimeout(()=>ts.style.display='none',1000);
  dramaticChord();
  runScenes();
});
</script>
